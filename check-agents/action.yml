name: "Check AGENTS.md links"
description: "Checks that the root AGENTS.md links to every nested AGENTS.md file."

inputs:
  working-directory:
    description: "Directory to check, relative to the workflow workspace."
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install action dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        bun install --frozen-lockfile

    - name: Check AGENTS.md links
      shell: bash
      env:
        AGENTS_CHECK_ROOT: ${{ inputs.working-directory }}
      run: bun run ${{ github.action_path }}/check-agents.ts
